<style>
  :root {
    --bg: #080b0f;
    --surface: #0d1117;
    --border: rgba(0, 247, 255, 0.15);
    --cyan: #00f7ff;
    --cyan-dim: rgba(0, 247, 255, 0.5);
    --cyan-faint: rgba(0, 247, 255, 0.08);
    --white: #e6edf3;
    --dim: #6e7681;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #f0883e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* Scanline effect */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 999;
  }

  #terminal {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 120px;
    min-height: 100vh;
  }

  /* Window chrome */
  .window-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: #161b22;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    margin-bottom: 0;
  }

  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #ffbd2e; }
  .dot-green { background: #28ca42; }

  .window-title {
    flex: 1;
    text-align: center;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .terminal-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0 0 8px 8px;
    padding: 20px 24px;
    min-height: calc(100vh - 80px);
    position: relative;
  }

  /* Boot sequence */
  .boot-line {
    font-size: 12px;
    color: var(--dim);
    line-height: 1.8;
    opacity: 0;
    animation: fadeIn 0.1s forwards;
  }

  .boot-line.cyan { color: var(--cyan); }
  .boot-line.green { color: var(--green); }

  /* Output lines */
  .output {
    margin: 4px 0;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .prompt-line {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: 12px;
    font-size: 13px;
  }

  .prompt-user { color: var(--green); }
  .prompt-at { color: var(--dim); }
  .prompt-host { color: var(--cyan); }
  .prompt-path { color: var(--cyan-dim); }
  .prompt-symbol { color: var(--white); margin: 0 6px; }
  .prompt-cmd { color: var(--white); }
  .prompt-cmd.typing { border-right: 2px solid var(--cyan); animation: blink 1s infinite; }

  /* Input area */
  #input-container {
    display: flex;
    align-items: center;
    margin-top: 12px;
    position: sticky;
    bottom: 20px;
  }

  #input-container .prompt-user { color: var(--green); }
  #input-container .prompt-host { color: var(--cyan); }

  #cmd-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    flex: 1;
    caret-color: var(--cyan);
  }

  /* Content styling */
  .section-header {
    color: var(--cyan);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    margin: 2px 0;
  }

  .key { color: var(--cyan-dim); }
  .val { color: var(--white); }
  .str { color: #a5d6ff; }
  .num { color: #79c0ff; }
  .comment { color: var(--dim); font-style: italic; }
  .success { color: var(--green); }
  .warn { color: var(--yellow); }
  .error-text { color: var(--red); }
  .highlight { color: var(--cyan); font-weight: 700; }
  .dim-text { color: var(--dim); }
  .orange { color: var(--orange); }

  .box {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    margin: 8px 0;
    background: var(--cyan-faint);
  }

  .metric-row {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 12px;
    padding: 3px 0;
  }

  .metric-tag {
    color: var(--cyan);
    background: rgba(0,247,255,0.1);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    min-width: 52px;
    text-align: center;
  }

  .metric-bar {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .metric-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), rgba(0,247,255,0.4));
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  .metric-val { color: var(--white); font-size: 11px; min-width: 80px; text-align: right; }

  .project-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin: 8px 0;
    background: rgba(13,17,23,0.8);
    transition: border-color 0.2s;
    cursor: pointer;
  }
  .project-card:hover { border-color: var(--cyan); }
  .project-title { color: var(--cyan); font-weight: 700; font-size: 13px; }
  .project-desc { color: var(--dim); font-size: 11px; margin-top: 4px; line-height: 1.6; }
  .project-tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    background: rgba(255,255,255,0.06);
    color: var(--dim);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .tag.special { background: rgba(0,247,255,0.1); color: var(--cyan); border-color: rgba(0,247,255,0.2); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  .link-text {
    color: var(--cyan);
    text-decoration: underline;
    cursor: pointer;
  }
  .link-text:hover { opacity: 0.7; }

  .glitch {
    position: relative;
    color: var(--cyan);
    font-weight: 700;
    font-size: 32px;
    letter-spacing: 8px;
    text-align: center;
    display: block;
    padding: 12px 0;
    animation: glitch-skew 8s infinite;
  }

  .glitch::before, .glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0; right: 0;
  }
  .glitch::before {
    color: #ff0040;
    animation: glitch-1 4s infinite;
    clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
    opacity: 0.6;
  }
  .glitch::after {
    color: #00f7ff;
    animation: glitch-2 4s infinite;
    clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
    opacity: 0.4;
  }

  @keyframes glitch-1 {
    0%, 90%, 100% { transform: translate(0); }
    92% { transform: translate(-2px, 1px); }
    94% { transform: translate(2px, -1px); }
    96% { transform: translate(-1px, 2px); }
  }
  @keyframes glitch-2 {
    0%, 88%, 100% { transform: translate(0); }
    90% { transform: translate(2px, -2px); }
    93% { transform: translate(-2px, 1px); }
  }
  @keyframes glitch-skew {
    0%, 85%, 100% { transform: skewX(0); }
    87% { transform: skewX(0.5deg); }
    89% { transform: skewX(-0.5deg); }
  }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes blink { 0%, 100% { border-color: var(--cyan); } 50% { border-color: transparent; } }

  .cursor-blink {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--cyan);
    vertical-align: middle;
    animation: blink 1s infinite;
    margin-left: 2px;
  }

  /* Help table */
  .cmd-table { width: 100%; font-size: 12px; }
  .cmd-table td { padding: 3px 0; vertical-align: top; }
  .cmd-table td:first-child { color: var(--cyan); min-width: 160px; }
  .cmd-table td:last-child { color: var(--dim); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Mobile */
  @media (max-width: 600px) {
    #terminal { padding: 12px 8px 100px; }
    .terminal-body { padding: 14px 12px; }
    .glitch { font-size: 22px; letter-spacing: 5px; }
  }

  .ascii-art {
    color: var(--cyan);
    font-size: 10px;
    line-height: 1.2;
    opacity: 0.7;
    text-align: center;
    margin: 8px 0;
  }
</style>

      line.style.animationDelay = '0s';
      line.textContent = text;
      output.appendChild(line);
      scrollBottom();
    }, delay);

  setTimeout(() => {

// ─── COMMAND PROCESSING ───────────────────────────────────────────────────────
function printPrompt(cmd) {
  const line = document.createElement('div');
  line.className = 'prompt-line';
  line.innerHTML = `<span class="prompt-user">abhi</span><span style="color:var(--dim)">@</span><span class="prompt-host">portfolio</span><span style="color:var(--dim)">:</span><span class="prompt-path">${pathEl.textContent}</span><span class="prompt-symbol">$</span>&nbsp;<span class="prompt-cmd">${escHtml(cmd)}</span>`;
  output.appendChild(line);
}

function printOutput(html) {
  const div = document.createElement('div');
  div.className = 'output';
  div.innerHTML = html;
  output.appendChild(div);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom() {
  window.scrollTo(0, document.body.scrollHeight);
}

function runCmd(raw) {
  const cmd = raw.trim().toLowerCase();
  if (!cmd) return;

  history.unshift(raw.trim());
  histIdx = -1;

  printPrompt(raw.trim());

  // path simulation
  if (cmd === 'ls projects/' || cmd === 'ls projects') {
    pathEl.textContent = '~/projects';
  } else if (cmd === 'clear') {
    // handled below
  } else {
    pathEl.textContent = '~';
  }

  // find handler
  const handler = COMMANDS[cmd] || COMMANDS[cmd.replace(/\s+/g, ' ')];

  if (handler) {
    const result = handler();
    if (result !== null && result !== undefined) {
      printOutput(result);
    }
  } else if (cmd.startsWith('cat ')) {
    const project = cmd.slice(4).trim();
    const projectCmd = `cat ${project}`;
    const h = COMMANDS[projectCmd];
    if (h) {
      const result = h();
      if (result) printOutput(result);
    } else {
      printOutput(`<span class="error-text">cat: ${escHtml(project)}: No such file or directory</span>\n<span class="dim-text">// Try: ls projects/</span>`);
    }
  } else if (cmd.startsWith('open ')) {
    const target = cmd.slice(5).trim();
    const h = COMMANDS[`open ${target}`];
    if (h) {
      const result = h();
      if (result) printOutput(result);
    } else {
      printOutput(`<span class="error-text">open: ${escHtml(target)}: not found</span>`);
    }
  } else if (cmd === 'ls' || cmd === 'ls -la') {
    printOutput(COMMANDS['ls projects/']());
  } else if (cmd === 'pwd') {
    printOutput(`<span class="dim-text">/home/abhi</span>`);
  } else if (cmd === 'date') {
    printOutput(`<span class="dim-text">${new Date().toUTCString()}</span>`);
  } else if (cmd === 'uname -a') {
    printOutput(`<span class="dim-text">AIPortfolio 5.0.0-production #1 SMP AI Platform Engineer · Virginia Tech · McLean VA</span>`);
  } else {
    printOutput(`<span class="error-text">command not found: ${escHtml(raw.trim())}</span>\n<span class="dim-text">// Type 'help' for available commands</span>`);
  }

  scrollBottom();
}

// ─── INPUT HANDLING ───────────────────────────────────────────────────────────
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const val = input.value;
    input.value = '';
    runCmd(val);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) {
      histIdx++;
      input.value = history[histIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) {
      histIdx--;
      input.value = history[histIdx];
    } else {
      histIdx = -1;
      input.value = '';
    }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const val = input.value.trim().toLowerCase();
    const cmds = Object.keys(COMMANDS);
    const match = cmds.find(c => c.startsWith(val));
    if (match) input.value = match;
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    output.innerHTML = '';
  }
});

window.onload = () => {
  boot();
};
